---
- name: Первичная настройка и оптимизация серверов под K3s
  hosts: all
  become: true
  tasks:
    # ─── НАСТРОЙКА SWAP ───
    - name: Проверить, существует ли swap-файл
      stat:
        path: /swapfile
      register: swapfile_stat

    - name: Создать swap-файл размером 2GB
      command: fallocate -l 2G /swapfile
      when: not swapfile_stat.stat.exists

    - name: Установить права доступа на swap-файл (только для root)
      file:
        path: /swapfile
        owner: root
        group: root
        mode: '0600'
      when: not swapfile_stat.stat.exists

    - name: Форматировать swap-файл
      command: mkswap /swapfile
      when: not swapfile_stat.stat.exists

    - name: Подключить swap-файл в текущей сессии
      command: swapon /swapfile
      when: not swapfile_stat.stat.exists

    - name: Добавить swap в /etc/fstab для автозапуска при загрузке
      mount:
        name: none
        src: /swapfile
        fstype: swap
        opts: sw
        state: present

    # ─── ОПТИМИЗАЦИЯ ПАМЯТИ И ЯДРА (SYSCTL) ───
    # Использовать swap только при крайней необходимости — высокий swappiness
    # постоянно сбрасывает активные процессы на диск, убивая производительность.
    - name: Настроить swappiness (vm.swappiness = 10)
      sysctl:
        name: vm.swappiness
        value: '10'
        state: present
        reload: yes

    - name: Увеличить лимит inotify.max_user_watches для Kubernetes
      sysctl:
        name: fs.inotify.max_user_watches
        value: '524288'
        state: present
        reload: yes

    - name: Увеличить лимит inotify.max_user_instances для Kubernetes
      sysctl:
        name: fs.inotify.max_user_instances
        value: '512'
        state: present
        reload: yes

    # ─── ОТКЛЮЧЕНИЕ НЕИСПОЛЬЗУЕМЫХ СЛУЖБ (Сбережение RAM) ───
    - name: Остановить и отключить snapd (освобождает RAM)
      systemd:
        name: "{{ item }}"
        state: stopped
        enabled: no
      loop:
        - snapd
        - snapd.socket
        - snapd.seeded
      ignore_errors: yes
      # ignore_errors: snapd может уже не быть на сервере — это не ошибка

    # ─── ОБНОВЛЕНИЕ СИСТЕМЫ И ПАКЕТЫ ───
    - name: Установить полезные системные утилиты
      apt:
        name:
          - curl
          - htop
          - ufw
          - git
        state: present
        update_cache: yes
