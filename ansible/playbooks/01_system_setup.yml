---
- name: System setup and optimization for K3s
  hosts: all
  become: true
  tasks:
    # ─── SWAP SETUP ───
    - name: Check if swapfile exists
      stat:
        path: /swapfile
      register: swapfile_stat

    - name: Create 2GB swapfile
      command: fallocate -l 2G /swapfile
      when: not swapfile_stat.stat.exists

    - name: Set permissions for swapfile (root only)
      file:
        path: /swapfile
        owner: root
        group: root
        mode: '0600'
      when: not swapfile_stat.stat.exists

    - name: Format swapfile
      command: mkswap /swapfile
      when: not swapfile_stat.stat.exists

    - name: Turn swap on in current session
      command: swapon /swapfile
      when: not swapfile_stat.stat.exists

    - name: Add swap to /etc/fstab for boot auto-start
      mount:
        name: none
        src: /swapfile
        fstype: swap
        opts: sw
        state: present

    # ─── MEMORY AND KERNEL OPTIMIZATION (SYSCTL) ───
    # Why vm.swappiness = 10: makes the system use SWAP only when needed.
    # High swappiness causes slow disk activity and hurts performance.
    - name: Set swappiness (vm.swappiness = 10)
      sysctl:
        name: vm.swappiness
        value: '10'
        state: present
        reload: yes

    - name: Increase inotify.max_user_watches limit for Kubernetes
      sysctl:
        name: fs.inotify.max_user_watches
        value: '524288'
        state: present
        reload: yes

    - name: Increase inotify.max_user_instances limit for Kubernetes
      sysctl:
        name: fs.inotify.max_user_instances
        value: '512'
        state: present
        reload: yes

    # ─── DISABLE UNUSED SERVICES (SAVE RAM) ───
    - name: Stop and disable snapd (saves RAM)
      systemd:
        name: "{{ item }}"
        state: stopped
        enabled: no
      loop:
        - snapd
        - snapd.socket
        - snapd.seeded
      ignore_errors: yes
      # Why ignore_errors: snapd may not be on the server, this is okay.

    # ─── SYSTEM UPDATE AND PACKAGES ───
    - name: Install useful system utilities
      apt:
        name:
          - curl
          - htop
          - ufw
          - git
        state: present
        update_cache: yes
