---
# Why: K3s install has two parts: first master node (creates a token),
# then workers (they use this token to join).
# So the playbook has two separate plays with different hosts.

- name: Install K3s on Master node
  hosts: master
  become: true
  tasks:
    - name: Download and install K3s server (Diet Mode + Memory Optimized)
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server \
          --disable traefik \
          --disable metrics-server \
          --disable local-storage \
          --disable-agent \
          --node-external-ip={{ ansible_host }} \
          --flannel-backend=wireguard-native \
          --write-kubeconfig-mode 644 \
          --etcd-arg auto-compaction-mode=periodic \
          --etcd-arg auto-compaction-retention=1h" sh -
      # Why --node-external-ip: allows nodes in separate cloud VPCs to advertise public IP.
      # Why --flannel-backend=wireguard-native: creates secure encrypted tunnels over public IPs.
      # Why --etcd-arg auto-compaction-*: compress etcd database every 1h to reduce RAM usage (critical for e2-micro).

    - name: Wait for K3s to start (up to 60 seconds)
      wait_for:
        path: /var/lib/rancher/k3s/server/node-token
        timeout: 60
      # Why: token is not created instantly. If workers connect before it exists,
      # they will fail to authenticate.

    - name: Read worker connection token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token
      # Why slurp: reads file from remote node and returns it as a variable.
      # We do not need to copy the file locally.

    - name: Save token as Ansible fact
      set_fact:
        k3s_node_token: "{{ k3s_token.content | b64decode | trim }}"
      # Why set_fact: makes the token available in the next play for workers.
      # b64decode is needed because slurp returns base64.

    - name: Save master IP as Ansible fact
      set_fact:
        master_ip: "{{ ansible_host }}"

- name: Install K3s on Worker nodes
  hosts: workers
  become: true
  vars:
    # Why hostvars: shares variables from the master play to the worker play.
    # Determine master dynamically from inventory group 'master'. This avoids
    # hardcoding hostnames and works when the master host is reassigned.
    master_host: "{{ groups['master'][0] }}"
    k3s_master_url: "https://{{ hostvars[ master_host ]['master_ip'] }}:6443"
    k3s_token: "{{ hostvars[ master_host ]['k3s_node_token'] }}"
  tasks:
    - name: Download and install K3s agent (worker + Multi-cloud optimized)
      shell: |
        curl -sfL https://get.k3s.io | K3S_URL="{{ k3s_master_url }}" \
          K3S_TOKEN="{{ k3s_token }}" INSTALL_K3S_EXEC="agent \
          --node-external-ip={{ ansible_host }}" sh -
      # Why K3S_URL and K3S_TOKEN: this is how agents connect.
      # K3S_URL points to the master node (port 6443 is K3s API).
      # K3S_TOKEN is the authentication token.

- name: Verify cluster
  hosts: master
  become: true
  tasks:
    - name: Show all cluster nodes
      command: k3s kubectl get nodes -o wide
      register: nodes_output
      # Why: verify that all 3 nodes are visible to the master and are Ready.

    - name: Print the result
      debug:
        msg: "{{ nodes_output.stdout_lines }}"
