---
- name: Install Python and pip
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
    state: present
  # Why: OCI SDK is a Python library. We need pip and venv to install it.

- name: Create directory for Oracle Catcher
  file:
    path: /opt/oracle_catcher
    state: directory
    mode: '0755'
  # Why /opt: standard directory for external programs in Linux.

- name: Create Python Virtual Environment
  command: python3 -m venv /opt/oracle_catcher/venv
  args:
    creates: /opt/oracle_catcher/venv/bin/python
  # Why venv: isolates Python packages from the system Python.
  # Why 'creates': does not run again if the folder already exists.

- name: Install OCI library in venv
  pip:
    name: oci
    virtualenv: /opt/oracle_catcher/venv
  # Why: 'oci' is the official library to control Oracle Cloud via API.

- name: Copy Oracle API key to server
  copy:
    src: oracle_api_key.pem
    dest: /opt/oracle_catcher/oracle_api_key.pem
    mode: '0600'
    owner: ubuntu
    group: ubuntu
  # Why mode 0600: private key must be secret. Only the owner can read it.
  # Why src: Ansible automatically looks in roles/oracle_catcher/files/ folder.

- name: Deploy Oracle Catcher script from template
  template:
    src: oracle_turbo_catcher.py.j2
    dest: /opt/oracle_catcher/oracle_turbo_catcher.py
    mode: '0755'
    owner: ubuntu
    group: ubuntu
  notify: Restart Oracle Catcher
  # Why template: puts secrets from Vault into the script.
  # notify: restarts the service if the script changes.

- name: Install systemd service for Oracle Catcher
  template:
    src: oracle_catcher.service.j2
    dest: /etc/systemd/system/oracle_catcher.service
    mode: '0644'
  notify: Restart Oracle Catcher
  # Why systemd: starts the service on system boot and restarts it on crash.

- name: Enable and start Oracle Catcher service
  systemd:
    name: oracle_catcher.service
    state: started
    enabled: yes
    daemon_reload: yes
