---
- name: Установить Python и pip
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
    state: present
  # Зачем: OCI SDK — это Python-библиотека. Без pip и venv её не установить.

- name: Создать директорию для Oracle Catcher
  file:
    path: /opt/oracle_catcher
    state: directory
    mode: '0755'
  # Зачем /opt: стандартная директория для стороннего ПО в Linux.

- name: Создать Python Virtual Environment
  command: python3 -m venv /opt/oracle_catcher/venv
  args:
    creates: /opt/oracle_catcher/venv/bin/python
  # Зачем venv: изолирует зависимости OCI SDK от системного Python.
  # creates: делает задачу идемпотентной — не пересоздаёт venv при повторном запуске.

- name: Установить библиотеку oci в venv
  pip:
    name: oci
    virtualenv: /opt/oracle_catcher/venv
  # Зачем: oci — официальный SDK Oracle для управления облаком через API.

- name: Скопировать API ключ Oracle на сервер
  copy:
    src: oracle_api_key.pem
    dest: /opt/oracle_catcher/oracle_api_key.pem
    mode: '0600'
    owner: ubuntu
    group: ubuntu
  # Зачем mode 0600: приватный ключ должен быть доступен ТОЛЬКО владельцу.
  # Иначе OCI SDK откажется его использовать из соображений безопасности.
  # Зачем src без пути: внутри роли Ansible автоматически ищет файлы в roles/oracle_catcher/files/

- name: Развернуть скрипт Oracle Catcher из шаблона
  template:
    src: oracle_turbo_catcher.py.j2
    dest: /opt/oracle_catcher/oracle_turbo_catcher.py
    mode: '0755'
    owner: ubuntu
    group: ubuntu
  notify: Restart Oracle Catcher
  # Зачем template: подставляет секреты из Vault в скрипт при деплое.
  # notify: автоматически перезапустит сервис, если скрипт изменился.

- name: Установить systemd сервис Oracle Catcher
  template:
    src: oracle_catcher.service.j2
    dest: /etc/systemd/system/oracle_catcher.service
    mode: '0644'
  notify: Restart Oracle Catcher
  # Зачем systemd: обеспечивает автозапуск после ребута сервера и
  # автоматический перезапуск при падении скрипта (Restart=on-failure).

- name: Включить и запустить сервис Oracle Catcher
  systemd:
    name: oracle_catcher.service
    state: started
    enabled: yes
    daemon_reload: yes
